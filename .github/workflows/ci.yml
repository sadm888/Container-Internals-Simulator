name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc make libcap-dev

      - name: Build
        run: make

      - name: Setup rootfs
        run: bash scripts/setup-rootfs.sh

      - name: Run test suite
        run: |
          # Tests that require network namespaces need root + unprivileged user namespaces
          # enable them if the kernel supports it
          echo 1 | sudo tee /proc/sys/kernel/unprivileged_userns_clone 2>/dev/null || true
          sudo bash tests/run_all.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: container-sim-linux-amd64
          path: container-sim
          retention-days: 7
