name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc make libcap-dev libseccomp-dev

      - name: Build
        run: make

      - name: Verify binary
        run: |
          test -f ./container-sim
          file ./container-sim | grep -q ELF

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: container-sim-linux-amd64
          path: container-sim
          retention-days: 7
